<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Halo — Wheels editor (interactive prototype)</title>
<style>
  :root{
    /* Halo's real palette, pulled from the SwiftUI source */
    --bg:#0f121a;            /* AmbientBackground base */
    --panel:#12151d;
    --hub:#1a1c26;           /* hub fill 0.10,0.11,0.15 */
    --spoke:#242630;         /* spoke fill 0.14,0.15,0.19 */
    --accentA:#8c80fa;       /* 0.55,0.50,0.98 */
    --accentB:#66b8fa;       /* 0.40,0.72,0.98 */
    --red:#ff5973;           /* cancel / recording 1.0,0.35,0.45 */
    --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.14);
    --txt:#eef0f6;
    --txt2:rgba(255,255,255,.55);
    --txt3:rgba(255,255,255,.32);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(620px 620px at 0% 0%, rgba(140,128,250,.16), transparent 60%),
      radial-gradient(680px 680px at 100% 100%, rgba(102,184,250,.12), transparent 60%),
      var(--bg);
    color:var(--txt);
    font:13px/1.4 -apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased;
    height:100vh; overflow:hidden;
  }
  .win{display:grid; grid-template-columns:208px 1fr 332px; height:100vh}

  /* ---- left rail: targets ---- */
  .rail{border-right:1px solid var(--line); padding:14px 10px; display:flex; flex-direction:column; gap:2px}
  .rail h4{font-size:10px; letter-spacing:.09em; color:var(--txt3); margin:14px 8px 6px; text-transform:uppercase; font-weight:600}
  .rail h4:first-child{margin-top:2px}
  .target{display:flex; align-items:center; gap:9px; padding:7px 9px; border-radius:8px; cursor:pointer; color:var(--txt2)}
  .target:hover{background:rgba(255,255,255,.045)}
  .target.sel{background:linear-gradient(120deg,rgba(140,128,250,.22),rgba(102,184,250,.18)); color:var(--txt)}
  .target .dot{width:18px;height:18px;border-radius:5px;display:grid;place-items:center;font-size:11px;background:rgba(255,255,255,.07)}
  .target .apps{margin-left:auto; font-size:10px; color:var(--txt3)}
  .target.add{color:var(--txt3)}
  .rail .spacer{flex:1}

  /* ---- center: canvas ---- */
  .stage{position:relative; display:flex; flex-direction:column}
  .topbar{display:flex; align-items:center; gap:14px; padding:14px 20px; }
  .crumb{display:flex; align-items:center; gap:6px; font-size:13px; color:var(--txt2)}
  .crumb b{color:var(--txt); font-weight:600}
  .crumb .sep{color:var(--txt3)}
  .crumb .here{color:var(--txt)}
  .seg{margin-left:auto; display:flex; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:8px; padding:2px}
  .seg button{all:unset; padding:5px 12px; border-radius:6px; font-size:12px; color:var(--txt2); cursor:pointer}
  .seg button.on{background:rgba(255,255,255,.10); color:var(--txt)}
  .test{all:unset; cursor:pointer; padding:6px 13px; border-radius:8px; font-size:12px; color:var(--txt);
        background:linear-gradient(120deg,var(--accentA),var(--accentB))}
  .canvas-wrap{flex:1; display:grid; place-items:center; position:relative}
  svg{display:block; touch-action:none; user-select:none}
  .legend{position:absolute; bottom:16px; left:0; right:0; text-align:center; color:var(--txt3); font-size:11px}
  .legend b{color:var(--txt2); font-weight:600}
  .saved{position:absolute; top:16px; right:20px; display:flex; align-items:center; gap:6px; font-size:11px; color:#7fdca0;
         opacity:0; transition:opacity .25s}
  .saved.show{opacity:1}
  .saved .d{width:6px;height:6px;border-radius:50%;background:#7fdca0}

  /* ---- right: inspector ---- */
  .insp{border-left:1px solid var(--line); padding:18px 18px 22px; overflow:auto}
  .insp .kicker{font-size:10px; letter-spacing:.09em; color:var(--txt3); text-transform:uppercase; font-weight:600; margin-bottom:4px}
  .insp h3{margin:0 0 14px; font-size:17px; font-weight:600}
  .field{margin-bottom:14px}
  .field > label{display:block; font-size:11px; color:var(--txt2); margin-bottom:5px}
  .input{width:100%; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:8px; padding:7px 9px;
         color:var(--txt); font-size:13px; outline:none}
  .input:focus{border-color:rgba(140,128,250,.6)}
  .row{display:flex; gap:8px; align-items:center}
  .glyph-pick{display:flex; align-items:center; gap:8px}
  .glyph-pick .preview{width:34px;height:34px;border-radius:8px;background:var(--spoke);display:grid;place-items:center;font-size:18px}
  .typeseg{display:flex; background:rgba(255,255,255,.05); border:1px solid var(--line); border-radius:8px; padding:2px; width:100%}
  .typeseg button{all:unset; flex:1; text-align:center; padding:6px; border-radius:6px; font-size:12px; color:var(--txt2); cursor:pointer}
  .typeseg button.on{background:rgba(255,255,255,.10); color:var(--txt)}
  .card{background:rgba(255,255,255,.035); border:1px solid var(--line); border-radius:10px; padding:12px}
  .step{display:flex; align-items:center; gap:8px; padding:7px 9px; background:rgba(255,255,255,.04); border:1px solid var(--line);
        border-radius:8px; margin-bottom:7px}
  .step .kind{font-size:10px; color:var(--txt3); text-transform:uppercase; letter-spacing:.06em; min-width:30px}
  .chord{font-family:"SF Mono",ui-monospace,Menlo,monospace; font-size:13px; background:rgba(140,128,250,.16);
         border:1px solid rgba(140,128,250,.35); padding:2px 8px; border-radius:6px; color:#cfc9ff}
  .step .grip{margin-left:auto; color:var(--txt3); cursor:grab}
  .btn{all:unset; cursor:pointer; font-size:12px; padding:6px 11px; border-radius:7px; border:1px solid var(--line2); color:var(--txt)}
  .btn:hover{background:rgba(255,255,255,.05)}
  .btn.accent{border:0; background:linear-gradient(120deg,var(--accentA),var(--accentB))}
  .btn.ghost{border:0; color:var(--txt2)}
  .btn.danger{border-color:rgba(255,89,115,.4); color:#ff8fa0}
  .btn.full{display:block; text-align:center; width:100%; padding:9px}
  .rec{display:flex; align-items:center; gap:8px; justify-content:space-between; background:rgba(255,255,255,.04);
       border:1px dashed var(--line2); border-radius:8px; padding:8px 10px}
  .slider-row{display:flex; align-items:center; gap:10px}
  .slider-row input[type=range]{flex:1; accent-color:var(--accentA)}
  .slider-row .val{font-family:"SF Mono",ui-monospace,monospace; font-size:12px; color:var(--txt2); min-width:46px; text-align:right}
  .hint{font-size:11px; color:var(--txt3); line-height:1.5; margin-top:6px}
  .hidden{display:none}
</style>
</head>
<body>
<div class="win">

  <!-- ============ TARGETS RAIL ============ -->
  <aside class="rail">
    <h4>Wheels</h4>
    <div class="target" data-t="default"><span class="dot">◎</span> Default <span class="apps">no match</span></div>
    <div class="target sel" data-t="term"><span class="dot">⌥</span> Terminal <span class="apps">7 apps</span></div>
    <div class="target" data-t="browser"><span class="dot">◐</span> Browser <span class="apps">6 apps</span></div>
    <div class="target" data-t="editor"><span class="dot">⌘</span> Editor <span class="apps">4 apps</span></div>
    <div class="target add"><span class="dot">+</span> Add profile…</div>
    <div class="spacer"></div>
    <h4>Summon</h4>
    <div class="target"><span class="dot">⬤</span> Forward button <span class="apps">btn 4</span></div>
  </aside>

  <!-- ============ CANVAS ============ -->
  <section class="stage">
    <div class="topbar">
      <div class="crumb" id="crumb">
        <b>Terminal</b>
      </div>
      <div class="seg" id="seg">
        <button class="on" data-seg="wheel">Wheel</button>
        <button data-seg="finish">Finish ring</button>
      </div>
      <button class="test">▶ Test</button>
    </div>
    <div class="canvas-wrap">
      <div class="saved" id="saved"><span class="d"></span> Synced to config.yaml</div>
      <svg id="wheel" width="560" height="560" viewBox="0 0 560 560"></svg>
      <div class="legend">
        <b>Drag a spoke</b> to reorder · <b>Drag the ◇ handles</b> to shape the arc · <b>Double-click a well</b> to drill in · click to edit
      </div>
    </div>
  </section>

  <!-- ============ INSPECTOR ============ -->
  <aside class="insp" id="insp"></aside>

</div>

<script>
// ----- model (mirrors HaloConfig value types) -----
const G = { ret:'↩', up:'↑', down:'↓', tab:'⇥', esc:'⎋', stop:'■', more:'⋯', back:'‹', fwd:'›',
            reload:'↻', plus:'+', x:'⨯', find:'⌕', mic:'🎙' };

let model = {
  arc:{ span:210, center:-90 },   // degrees; center -90 = straight up
  radius:150,
  center:null,                    // release-at-hub action (null → context default = dictate)
  spokes:[
    {label:'Enter', glyph:G.ret,  type:'action', steps:[{kind:'key', val:'return'}]},
    {label:'Up',    glyph:G.up,   type:'action', steps:[{kind:'key', val:'up'}]},
    {label:'Down',  glyph:G.down, type:'action', steps:[{kind:'key', val:'down'}]},
    {label:'Tab',   glyph:G.tab,  type:'action', steps:[{kind:'key', val:'tab'}]},
    {label:'Esc',   glyph:G.esc,  type:'action', steps:[{kind:'key', val:'esc'}]},
    {label:'Stop',  glyph:G.stop, type:'action', steps:[{kind:'key', val:'ctrl+c'}]},
    {label:'More',  glyph:G.more, type:'well',   steps:[]},
  ]
};
let sel = 5;            // selected spoke index, or 'center', or null (halo props)

// ----- geometry (matches Arc.swift; svg y-down, 0°=right, +90°=down, -90°=up) -----
const CX=280, CY=280;
const clampSpan = s => Math.min(Math.max(s,0),330);
function pol(r, deg){ const a=deg*Math.PI/180; return [CX+r*Math.cos(a), CY+r*Math.sin(a)]; }
function placements(n){
  if(n<=0) return [];
  if(n===1) return [model.arc.center];
  const span=clampSpan(model.arc.span), start=model.arc.center-span/2, step=span/(n-1);
  return Array.from({length:n},(_,i)=>start+i*step);
}
function angleOf(x,y){ return Math.atan2(y-CY, x-CX)*180/Math.PI; }
function dWrap(a,b){ let d=(a-b)%360; if(d>180)d-=360; if(d<-180)d+=360; return d; }

// ----- svg helpers -----
const svg=document.getElementById('wheel');
const SVGNS='http://www.w3.org/2000/svg';
function el(t,attrs={}){ const e=document.createElementNS(SVGNS,t); for(const k in attrs) e.setAttribute(k,attrs[k]); return e; }
function toSvg(evt){ const p=svg.createSVGPoint(); p.x=evt.clientX; p.y=evt.clientY; const m=svg.getScreenCTM().inverse(); const q=p.matrixTransform(m); return [q.x,q.y]; }

function defs(){
  const d=el('defs');
  const g=el('linearGradient',{id:'acc',x1:'0',y1:'0',x2:'1',y2:'1'});
  g.append(el('stop',{offset:'0',  'stop-color':'#8c80fa'}));
  g.append(el('stop',{offset:'1',  'stop-color':'#66b8fa'}));
  d.append(g);
  const rg=el('radialGradient',{id:'glow'});
  rg.append(el('stop',{offset:'0','stop-color':'rgba(140,128,250,.18)'}));
  rg.append(el('stop',{offset:'1','stop-color':'rgba(140,128,250,0)'}));
  d.append(rg);
  return d;
}

// ----- render -----
let drag=null;  // {type:'spoke'|'spanA'|'spanB'|'rotate', i}
function render(){
  svg.replaceChildren(defs());
  svg.append(el('circle',{cx:CX,cy:CY,r:230,fill:'url(#glow)'}));

  const n=model.spokes.length;
  const angs=placements(n);
  const span=clampSpan(model.arc.span), R=model.radius;

  // arc guide band + cancel wedge
  const aS=model.arc.center-span/2, aE=model.arc.center+span/2;
  svg.append(arcPath(R,aS,aE,'rgba(255,255,255,.10)',2,'4 6'));
  // cancel wedge label (the empty gap)
  const wedgeMid=model.arc.center+180;
  const [wx,wy]=pol(R+4,wedgeMid);
  const wedge=el('text',{x:wx,y:wy,fill:'rgba(255,89,115,.55)','font-size':11,'text-anchor':'middle','dominant-baseline':'middle'});
  wedge.textContent='⨯ cancel / drag here to delete';
  svg.append(wedge);

  // spokes
  angs.forEach((deg,i)=>{
    const [x,y]=pol(R,deg);
    const sp=model.spokes[i];
    const hot=(sel===i);
    const g=el('g',{class:'spoke', style:'cursor:grab', 'data-i':i});
    // connector
    g.append(el('line',{x1:CX,y1:CY,x2:x,y2:y,stroke:'rgba(255,255,255,.05)','stroke-width':1}));
    const r=34;
    g.append(el('circle',{cx:x,cy:y,r:r+(hot?4:0), fill:hot?'url(#acc)':'#242630',
      stroke: sp.type==='well'?'rgba(255,255,255,.30)':'transparent', 'stroke-width':1.5}));
    const ic=el('text',{x,y:y-5,'text-anchor':'middle','dominant-baseline':'middle',fill:'#fff','font-size':20}); ic.textContent=sp.glyph; g.append(ic);
    const lb=el('text',{x,y:y+15,'text-anchor':'middle','dominant-baseline':'middle',fill:hot?'#fff':'rgba(255,255,255,.8)','font-size':10}); lb.textContent=sp.label; g.append(lb);
    svg.append(g);
    g.addEventListener('pointerdown',e=>startDrag(e,{type:'spoke',i}));
    g.addEventListener('dblclick',()=>{ if(sp.type==='well') drillIn(i); });
  });

  // ghost add-slot at the next placement
  const ghostAngs=placements(n+1);
  const gd=ghostAngs[n];
  const [gx,gy]=pol(R,gd);
  const gg=el('g',{style:'cursor:pointer'});
  gg.append(el('circle',{cx:gx,cy:gy,r:26,fill:'rgba(255,255,255,.03)',stroke:'rgba(255,255,255,.18)','stroke-width':1.5,'stroke-dasharray':'4 5'}));
  const gp=el('text',{x:gx,y:gy,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,.45)','font-size':22}); gp.textContent='+'; gg.append(gp);
  svg.append(gg);
  gg.addEventListener('click',addSpoke);

  // hub
  const hub=el('g',{style:'cursor:pointer'});
  hub.append(el('circle',{cx:CX,cy:CY,r:58,fill:'#1a1c26',stroke:sel==='center'?'url(#acc)':'rgba(140,128,250,.5)','stroke-width':1.5}));
  const hi=el('text',{x:CX,y:CY-8,'text-anchor':'middle','dominant-baseline':'middle',fill:'#fff','font-size':20});
  hi.textContent = model.center ? '⊕' : G.mic; hub.append(hi);
  const ht=el('text',{x:CX,y:CY+14,'text-anchor':'middle','dominant-baseline':'middle',fill:'rgba(255,255,255,.6)','font-size':9.5});
  ht.textContent = model.center ? 'center action' : 'Release to dictate'; hub.append(ht);
  svg.append(hub);
  hub.addEventListener('pointerdown',e=>{ e.stopPropagation(); selectCenter(); });

  // arc handles (◇) at the two endpoints + rotate knob on the bisector
  handle(R+30, aS, 'spanA');
  handle(R+30, aE, 'spanB');
  rotateKnob(R+30, model.arc.center);

  renderInspector();
}

function arcPath(r,a0,a1,stroke,w,dash){
  const [x0,y0]=pol(r,a0),[x1,y1]=pol(r,a1);
  const large=(clampSpan(a1-a0)>180)?1:0;
  const p=el('path',{d:`M ${x0} ${y0} A ${r} ${r} 0 ${large} 1 ${x1} ${y1}`,fill:'none',stroke,'stroke-width':w});
  if(dash)p.setAttribute('stroke-dasharray',dash);
  return p;
}
function handle(r,deg,type){
  const [x,y]=pol(r,deg);
  const g=el('g',{style:'cursor:grab'});
  g.append(el('rect',{x:x-7,y:y-7,width:14,height:14,rx:3,transform:`rotate(45 ${x} ${y})`,fill:'#0f121a',stroke:'url(#acc)','stroke-width':2}));
  svg.append(g);
  g.addEventListener('pointerdown',e=>startDrag(e,{type}));
}
function rotateKnob(r,deg){
  const [x,y]=pol(r,deg);
  const g=el('g',{style:'cursor:grab'});
  g.append(el('circle',{cx:x,cy:y,r:8,fill:'#0f121a',stroke:'url(#acc)','stroke-width':2}));
  g.append(el('circle',{cx:x,cy:y,r:2.5,fill:'#8c80fa'}));
  svg.append(g);
  g.addEventListener('pointerdown',e=>startDrag(e,{type:'rotate'}));
}

// ----- interactions -----
function startDrag(e,info){ e.stopPropagation(); e.preventDefault(); drag=info; if(info.type==='spoke'){ sel=info.i; renderInspector(); } window.addEventListener('pointermove',onMove); window.addEventListener('pointerup',endDrag); }
function onMove(e){
  if(!drag) return;
  const [x,y]=toSvg(e);
  const ang=angleOf(x,y);
  if(drag.type==='spoke'){
    // reorder: drop into nearest slot
    const n=model.spokes.length, angs=placements(n);
    let best=0,bd=999; angs.forEach((a,i)=>{const d=Math.abs(dWrap(ang,a)); if(d<bd){bd=d;best=i;}});
    if(best!==drag.i){ const [s]=model.spokes.splice(drag.i,1); model.spokes.splice(best,0,s); drag.i=best; sel=best; render(); }
  } else if(drag.type==='spanA'||drag.type==='spanB'){
    const half=Math.abs(dWrap(ang,model.arc.center));
    model.arc.span=Math.round(clampSpan(half*2)/2)*2; render(); flashSaved();
  } else if(drag.type==='rotate'){
    model.arc.center=Math.round(ang/2)*2; render(); flashSaved();
  }
}
function endDrag(){ drag=null; window.removeEventListener('pointermove',onMove); window.removeEventListener('pointerup',endDrag); flashSaved(); }

svg.addEventListener('pointerdown',e=>{ if(e.target===svg){ sel=null; renderInspector(); }});

function addSpoke(){ model.spokes.push({label:'New', glyph:'•', type:'action', steps:[{kind:'key',val:'return'}]}); sel=model.spokes.length-1; render(); flashSaved(); }
function selectCenter(){ sel='center'; renderInspector(); }
function drillIn(i){ document.getElementById('crumb').innerHTML='<b>Terminal</b> <span class="sep">›</span> <span class="here">'+model.spokes[i].label+'</span>'; alert('Drill into well "'+model.spokes[i].label+'" → the canvas swaps to its sub-halo (its own arc / radius / spokes), breadcrumb climbs back out.\\n\\n(Static in this mockup.)'); }

let savedT;
function flashSaved(){ const s=document.getElementById('saved'); s.classList.add('show'); clearTimeout(savedT); savedT=setTimeout(()=>s.classList.remove('show'),1100); }

// ----- inspector -----
function renderInspector(){
  const insp=document.getElementById('insp');
  if(sel===null){ insp.innerHTML=haloPanel(); wireHalo(); return; }
  if(sel==='center'){ insp.innerHTML=centerPanel(); return; }
  const sp=model.spokes[sel];
  insp.innerHTML = `
    <div class="kicker">Spoke</div>
    <h3>${sp.label||'Untitled'}</h3>
    <div class="field"><label>Label</label><input class="input" id="f-label" value="${sp.label}"></div>
    <div class="field"><label>Glyph · SF Symbol</label>
      <div class="glyph-pick"><div class="preview">${sp.glyph}</div>
        <input class="input" id="f-glyph" value="${sp.glyph==='■'?'stop.circle':'arrow…'}" placeholder="e.g. arrow.up">
        <button class="btn">Browse…</button></div>
    </div>
    <div class="field"><label>Type</label>
      <div class="typeseg"><button class="${sp.type==='action'?'on':''}" onclick="setType('action')">Action</button>
        <button class="${sp.type==='well'?'on':''}" onclick="setType('well')">Well</button></div>
    </div>
    ${ sp.type==='well' ? wellBody(sp) : actionBody(sp) }
    <div style="margin-top:18px; display:flex; gap:8px">
      <button class="btn danger" onclick="delSpoke()">Delete spoke</button>
    </div>`;
  const lab=document.getElementById('f-label'); if(lab) lab.oninput=e=>{ model.spokes[sel].label=e.target.value; renderCanvasOnly(); flashSaved(); };
}
function actionBody(sp){
  const steps=sp.steps.map(s=>`
    <div class="step"><span class="kind">${s.kind}</span>
      ${ s.kind==='key' ? `<span class="chord">${fmtChord(s.val)}</span>` : `<span>${s.val}</span>` }
      <span class="grip">⋮⋮</span></div>`).join('');
  const single = sp.steps.length===1 && sp.steps[0].kind==='key';
  return `
    <div class="card">
      <div class="kicker" style="margin-bottom:8px">Action · ${sp.steps.length} step${sp.steps.length!==1?'s':''}</div>
      ${ single ? `<div class="rec"><span class="chord">${fmtChord(sp.steps[0].val)}</span><button class="btn accent">● Record shortcut</button></div>
                   <div class="hint">A single keystroke. Press <b>Add step</b> to build a macro (keys · text · paste · pause · dictation verbs).</div>`
                : steps }
      <div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap">
        <button class="btn ghost">+ Key</button><button class="btn ghost">+ Text</button>
        <button class="btn ghost">+ Pause</button><button class="btn ghost">+ Verb ▾</button>
      </div>
    </div>`;
}
function wellBody(sp){
  return `<div class="card">
      <div class="kicker" style="margin-bottom:8px">Well · nested halo</div>
      <div class="hint" style="margin:0 0 10px">Opens a sub-ring with its own spokes, arc and radius.</div>
      <button class="btn accent full" onclick="alert('Drill in → canvas swaps to the sub-halo.')">Edit well contents →</button>
    </div>`;
}
function centerPanel(){
  return `<div class="kicker">Center · release-at-hub</div><h3>Center action</h3>
    <div class="field"><div class="typeseg"><button class="on">Default (dictate)</button><button>Custom action</button></div></div>
    <div class="hint">The root wheel's center defaults to <b>dictate</b>. A finish ring's center defaults to <b>send</b>. Override with any step sequence — e.g. <span class="chord">do:send</span> then <span class="chord">return</span>.</div>`;
}
function haloPanel(){
  return `<div class="kicker">Wheel · Terminal</div><h3>Halo layout</h3>
    <div class="field"><label>Arc span</label><div class="slider-row"><input type="range" id="h-span" min="0" max="330" value="${model.arc.span}"><span class="val" id="v-span">${model.arc.span}°</span></div></div>
    <div class="field"><label>Arc center</label><div class="slider-row"><input type="range" id="h-center" min="-180" max="180" value="${model.arc.center}"><span class="val" id="v-center">${model.arc.center}°</span></div></div>
    <div class="field"><label>Radius</label><div class="slider-row"><input type="range" id="h-rad" min="80" max="210" value="${model.radius}"><span class="val" id="v-rad">${model.radius}</span></div></div>
    <div class="field"><label>Apps · bundle IDs</label>
      <div class="card" style="padding:8px">
        <div class="step" style="margin:0 0 6px"><span>⌥ Terminal</span><span class="grip">⨯</span></div>
        <div class="step" style="margin:0 0 6px"><span>⌥ iTerm</span><span class="grip">⨯</span></div>
        <div class="step" style="margin:0"><span>⌥ Ghostty</span><span class="grip">⨯</span></div>
      </div>
      <button class="btn ghost" style="margin-top:8px">+ Add app…</button>
    </div>
    <div class="hint">Nothing selected → you're editing the wheel itself. Click a spoke to edit it, or the hub for the center action.</div>`;
}
function wireHalo(){
  const bind=(id,vid,suf,key,sub)=>{ const r=document.getElementById(id); if(!r)return; r.oninput=e=>{ const v=+e.target.value; if(sub){model.arc[key]=v;}else{model[key]=v;} document.getElementById(vid).textContent=v+suf; render(); document.getElementById(id)?.focus(); flashSaved(); }; };
  bind('h-span','v-span','°','span',true);
  bind('h-center','v-center','°','center',true);
  bind('h-rad','v-rad','','radius',false);
}
function renderCanvasOnly(){ render(); }

// ----- helpers exposed to inline handlers -----
window.setType=t=>{ model.spokes[sel].type=t; if(t==='well')model.spokes[sel].steps=[]; else if(!model.spokes[sel].steps.length)model.spokes[sel].steps=[{kind:'key',val:'return'}]; render(); flashSaved(); };
window.delSpoke=()=>{ model.spokes.splice(sel,1); sel=null; render(); flashSaved(); };

function fmtChord(v){ return v.replace('ctrl','⌃').replace('cmd','⌘').replace('shift','⇧').replace('opt','⌥').replace('return','↩ return').replace('+',' '); }

render();
</script>
